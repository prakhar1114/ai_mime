<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AI Mime - Agent Mode</title>
    <link rel="icon" type="image/png" sizes="16x16" href="/static/icon_16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/static/icon_32.png" />
    <link rel="icon" type="image/png" sizes="128x128" href="/static/icon_128.png" />
    <link rel="apple-touch-icon" sizes="256x256" href="/static/icon_256.png" />
    <link rel="stylesheet" href="/static/agent.css" />
  </head>
  <body>
    <div class="agent-shell">
      <aside class="sidebar">
        <div class="side-top" style="display: flex; align-items: center; gap: 8px;">
          <a class="back-link" href="/tasks" style="color: var(--muted, #7a746d); text-decoration: none; font-size: 13px; font-weight: 500; display: inline-flex; align-items: center;" onmouseover="this.style.color='var(--text, #282523)'" onmouseout="this.style.color='var(--muted, #7a746d)'">← Tasks</a>
          <span style="color: var(--sidebar-line, #e4e1dc);">|</span>
          <h1>Agent Mode</h1>
        </div>
        <button class="new-chat" id="newChatBtn">New Chat</button>
        <div class="sessions" id="sessionsList">
          <div class="empty">Loading sessions...</div>
        </div>
      </aside>

      <main class="chat">
        <header class="chat-head">
          <div class="chat-title" id="chatTitle">New Chat</div>
          <div class="chat-head-right" style="display: flex; align-items: center; gap: 14px;">
            <button id="toggleOverlayBtn" class="toggle-overlay-btn" type="button">Toggle HUD (On)</button>
            <label class="bash-toggle">
              <input type="checkbox" id="bashApprovalToggle" />
              <span>Require approval for Bash</span>
            </label>
          </div>
        </header>

        <section class="messages" id="messages">
          <div class="empty-state">Start a new workspace debugging chat.</div>
        </section>

        <footer class="composer">
          <div class="error" id="errorBox" hidden></div>
          <form id="chatForm">
            <textarea id="messageInput" rows="1" placeholder="Write a message..."></textarea>
            <div class="composer-actions">
              <select class="model-select" id="modelSelect" aria-label="Claude model"></select>
              <button class="stop" id="stopBtn" type="button" hidden>Stop</button>
              <button class="send" id="sendBtn" type="submit">Send</button>
            </div>
          </form>
        </footer>
      </main>
    </div>

    <script src="/static/agent.js"></script>
  </body>
</html>
