<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AI Mime - Tasks</title>
    <link rel="icon" type="image/png" sizes="16x16" href="/static/icon_16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/static/icon_32.png" />
    <link rel="icon" type="image/png" sizes="128x128" href="/static/icon_128.png" />
    <link rel="apple-touch-icon" sizes="256x256" href="/static/icon_256.png" />
    <link rel="stylesheet" href="/static/tasks.css" />
  </head>
  <body>
    <div class="tasks-shell">
      <aside class="sidebar" aria-label="Tasks controls">
        <div class="sidebar-head">
          <img class="app-logo" src="/static/icon_128.png" alt="" aria-hidden="true">
          <div>
            <div class="brand">AI Mime</div>
            <h1>Tasks</h1>
            <div class="sync" id="syncState">Loading</div>
          </div>
        </div>

        <div class="toolbar" aria-label="Task actions">
          <button class="btn" id="providerBtn">Provider</button>
          <button class="btn primary" id="startRecordingBtn">Start recording</button>
          <button class="btn" id="directBuildBtn">Direct build</button>
          <button class="btn" id="uploadSkillBtn">Upload skill</button>
          <button class="btn" id="importZipBtn">Import .zip</button>
          <button class="btn" id="exploreMarketplaceBtn">Explore marketplace</button>
          <button class="btn" id="agentModeBtn">Agent Mode</button>
          <button class="btn" id="openWorkflowsBtn">Open Workflows Folder</button>
          <button class="btn" id="autoinstallBtn">Auto-install skills</button>
          <button class="btn danger" id="quitAppBtn">Quit App</button>
        </div>
      </aside>

      <main class="workspace">
        <section class="task-surface">
          <div class="list-head">
            <div>Task</div>
            <div>Status</div>
            <div class="actions-head">Actions</div>
          </div>
          <div class="task-list" id="taskList">
            <div class="empty">Loading tasks...</div>
          </div>
        </section>
      </main>
    </div>

    <script src="/static/tasks.js"></script>
  </body>
</html>
