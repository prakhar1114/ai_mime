[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "llm-resolver"
version = "0.1.0"
description = "Shared LLM configuration and structured runtime calls for AI Mime tools"
requires-python = ">=3.11,<3.13"
dependencies = [
    "claude-agent-sdk==0.2.82",
    "litellm==1.83.0",
    "openai>=1.0.0",
    "openai-codex",
    "pydantic>=2.0.0",
    "PyYAML>=6.0",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
